version = 1

[defaults]
# Fail check on high+ severity findings (critical, high)
failOn = "high"
# Show annotations for medium+ severity findings
reportOn = "medium"
# Exclude build output from all skills
ignorePaths = ["dist/**"]

[[skills]]
name = "notseer"
paths = ["src/**/*.ts"]
ignorePaths = ["src/**/*.test.ts"]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "warden-lint-judge"
remote = "getsentry/skills"
scope = "report"

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "code-simplifier"
remote = "getsentry/sentry-skills"

[[skills.triggers]]
type = "local"
